<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 680" fill="none" role="img" aria-label="HacoStock app screenshot placeholder">
  <defs>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2c"/>
      <stop offset="1" stop-color="#0e0e10"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16161a"/>
      <stop offset="1" stop-color="#0d0d10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a5f"/>
      <stop offset="1" stop-color="#ffb088"/>
    </linearGradient>
    <linearGradient id="tile1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2026"/>
      <stop offset="1" stop-color="#1a1418"/>
    </linearGradient>
    <linearGradient id="tile2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2a30"/>
      <stop offset="1" stop-color="#13191d"/>
    </linearGradient>
    <linearGradient id="tile3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2820"/>
      <stop offset="1" stop-color="#1a1812"/>
    </linearGradient>
    <linearGradient id="tile4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#231d2a"/>
      <stop offset="1" stop-color="#16121c"/>
    </linearGradient>
  </defs>

  <!-- Device frame -->
  <rect x="0" y="0" width="320" height="680" rx="44" fill="url(#bezel)"/>
  <rect x="3" y="3" width="314" height="674" rx="41" fill="none" stroke="rgba(255,255,255,0.06)"/>
  <!-- Screen -->
  <rect x="10" y="10" width="300" height="660" rx="36" fill="url(#screen)"/>

  <!-- Dynamic Island -->
  <rect x="130" y="22" width="60" height="20" rx="10" fill="#000"/>

  <!-- Status bar -->
  <text x="32" y="36" fill="#f5f5f7" font-family="-apple-system, sans-serif" font-size="11" font-weight="600">9:41</text>
  <g transform="translate(266,28)" fill="#f5f5f7">
    <circle cx="2" cy="6" r="1.5"/><circle cx="7" cy="6" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="17" cy="6" r="1.5"/>
  </g>
  <rect x="290" y="26" width="18" height="10" rx="2.5" stroke="#f5f5f7" stroke-width="0.8" fill="none"/>
  <rect x="292" y="28" width="14" height="6" rx="1" fill="#f5f5f7"/>

  <!-- Header -->
  <text x="28" y="92" fill="#f5f5f7" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">コレクション</text>
  <text x="28" y="112" fill="#86868b" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">48 アイテム · 5 ボックス</text>
  <!-- Search icon button -->
  <circle cx="282" cy="92" r="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <circle cx="280" cy="90" r="4.5" stroke="#f5f5f7" stroke-width="1.4" fill="none"/>
  <line x1="283.5" y1="93.5" x2="287" y2="97" stroke="#f5f5f7" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Filter chips -->
  <rect x="24" y="130" width="48" height="26" rx="13" fill="url(#accent)"/>
  <text x="48" y="147" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="11" font-weight="600">すべて</text>
  <rect x="78" y="130" width="60" height="26" rx="13" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <text x="108" y="147" text-anchor="middle" fill="#a1a1a6" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">フィギュア</text>
  <rect x="144" y="130" width="46" height="26" rx="13" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <text x="167" y="147" text-anchor="middle" fill="#a1a1a6" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">書籍</text>
  <rect x="196" y="130" width="56" height="26" rx="13" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <text x="224" y="147" text-anchor="middle" fill="#a1a1a6" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">お気に入り</text>

  <!-- Grid tiles -->
  <!-- Row 1 -->
  <g>
    <rect x="24" y="178" width="132" height="132" rx="16" fill="url(#tile1)"/>
    <circle cx="90" cy="232" r="22" fill="rgba(255,255,255,0.04)"/>
    <rect x="36" y="280" width="60" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
    <rect x="36" y="292" width="40" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>

    <rect x="164" y="178" width="132" height="132" rx="16" fill="url(#tile2)"/>
    <rect x="190" y="208" width="80" height="56" rx="6" fill="rgba(255,255,255,0.05)"/>
    <rect x="176" y="280" width="70" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
    <rect x="176" y="292" width="48" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
  </g>
  <!-- Row 2 -->
  <g>
    <rect x="24" y="320" width="132" height="132" rx="16" fill="url(#tile3)"/>
    <rect x="50" y="346" width="80" height="60" rx="8" fill="rgba(255,255,255,0.04)"/>
    <rect x="36" y="422" width="56" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
    <rect x="36" y="434" width="36" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
    <!-- sale badge -->
    <rect x="36" y="332" width="44" height="20" rx="10" fill="url(#accent)"/>
    <text x="58" y="346" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="10" font-weight="700">販売中</text>

    <rect x="164" y="320" width="132" height="132" rx="16" fill="url(#tile4)"/>
    <circle cx="230" cy="378" r="26" fill="rgba(255,255,255,0.04)"/>
    <rect x="176" y="422" width="64" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
    <rect x="176" y="434" width="44" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
  </g>
  <!-- Row 3 partial -->
  <g>
    <rect x="24" y="462" width="132" height="132" rx="16" fill="url(#tile2)"/>
    <rect x="50" y="490" width="80" height="60" rx="8" fill="rgba(255,255,255,0.04)"/>
    <rect x="36" y="566" width="50" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>

    <rect x="164" y="462" width="132" height="132" rx="16" fill="url(#tile1)"/>
    <circle cx="230" cy="516" r="22" fill="rgba(255,255,255,0.04)"/>
    <rect x="176" y="566" width="56" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
  </g>

  <!-- Bottom tab bar -->
  <rect x="10" y="610" width="300" height="60" rx="0" fill="rgba(20,20,22,0.85)"/>
  <line x1="10" y1="610" x2="310" y2="610" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <!-- Tab icons (simple glyphs) -->
  <g transform="translate(56,632)">
    <rect x="-7" y="-7" width="14" height="14" rx="3" fill="url(#accent)"/>
    <text x="0" y="22" text-anchor="middle" fill="#ff8a5f" font-family="-apple-system, sans-serif" font-size="9" font-weight="600">一覧</text>
  </g>
  <g transform="translate(126,632)">
    <rect x="-8" y="-6" width="16" height="12" rx="2" stroke="#86868b" stroke-width="1.2" fill="none"/>
    <line x1="-8" y1="-2" x2="8" y2="-2" stroke="#86868b" stroke-width="1.2"/>
    <text x="0" y="22" text-anchor="middle" fill="#86868b" font-family="-apple-system, sans-serif" font-size="9" font-weight="500">ボックス</text>
  </g>
  <g transform="translate(196,632)">
    <circle cx="0" cy="0" r="11" fill="url(#accent)"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <g transform="translate(266,632)">
    <circle cx="-1" cy="-1" r="5" stroke="#86868b" stroke-width="1.2" fill="none"/>
    <line x1="3" y1="3" x2="6" y2="6" stroke="#86868b" stroke-width="1.4" stroke-linecap="round"/>
    <text x="0" y="22" text-anchor="middle" fill="#86868b" font-family="-apple-system, sans-serif" font-size="9" font-weight="500">検索</text>
  </g>
</svg>
