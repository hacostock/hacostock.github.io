<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 680" fill="none" role="img" aria-label="Box list screen placeholder">
  <defs>
    <linearGradient id="bezel-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2c"/>
      <stop offset="1" stop-color="#0e0e10"/>
    </linearGradient>
    <linearGradient id="screen-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16161a"/>
      <stop offset="1" stop-color="#0d0d10"/>
    </linearGradient>
    <linearGradient id="accent-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a5f"/>
      <stop offset="1" stop-color="#ffb088"/>
    </linearGradient>
    <linearGradient id="box-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2a30"/>
      <stop offset="1" stop-color="#1a1418"/>
    </linearGradient>
    <linearGradient id="box-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23303a"/>
      <stop offset="1" stop-color="#13191d"/>
    </linearGradient>
    <linearGradient id="box-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a3624"/>
      <stop offset="1" stop-color="#1a1812"/>
    </linearGradient>
    <linearGradient id="box-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2436"/>
      <stop offset="1" stop-color="#16121c"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="320" height="680" rx="44" fill="url(#bezel-b)"/>
  <rect x="3" y="3" width="314" height="674" rx="41" fill="none" stroke="rgba(255,255,255,0.06)"/>
  <rect x="10" y="10" width="300" height="660" rx="36" fill="url(#screen-b)"/>

  <rect x="130" y="22" width="60" height="20" rx="10" fill="#000"/>
  <text x="32" y="36" fill="#f5f5f7" font-family="-apple-system, sans-serif" font-size="11" font-weight="600">9:41</text>
  <rect x="290" y="26" width="18" height="10" rx="2.5" stroke="#f5f5f7" stroke-width="0.8" fill="none"/>
  <rect x="292" y="28" width="14" height="6" rx="1" fill="#f5f5f7"/>

  <!-- Header -->
  <text x="28" y="92" fill="#f5f5f7" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">ボックス</text>
  <text x="28" y="112" fill="#86868b" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">5 ボックス</text>
  <!-- Add button -->
  <circle cx="282" cy="92" r="16" fill="url(#accent-b)"/>
  <line x1="276" y1="92" x2="288" y2="92" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="282" y1="86" x2="282" y2="98" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Box cards -->
  <g transform="translate(24,140)">
    <!-- Card 1 -->
    <rect width="272" height="84" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <rect x="12" y="12" width="60" height="60" rx="12" fill="url(#box-a)"/>
    <circle cx="42" cy="42" r="14" fill="rgba(255,255,255,0.06)"/>
    <text x="86" y="38" fill="#f5f5f7" font-family="-apple-system, sans-serif" font-size="14" font-weight="600">フィギュア棚</text>
    <text x="86" y="56" fill="#86868b" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">18 アイテム</text>
    <circle cx="252" cy="42" r="2" fill="#86868b"/>
    <circle cx="246" cy="42" r="2" fill="#86868b"/>
    <circle cx="258" cy="42" r="2" fill="#86868b"/>
  </g>

  <g transform="translate(24,236)">
    <rect width="272" height="84" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <rect x="12" y="12" width="60" height="60" rx="12" fill="url(#box-b)"/>
    <rect x="28" y="28" width="28" height="28" rx="4" fill="rgba(255,255,255,0.06)"/>
    <text x="86" y="38" fill="#f5f5f7" font-family="-apple-system, sans-serif" font-size="14" font-weight="600">書籍コレクション</text>
    <text x="86" y="56" fill="#86868b" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">14 アイテム</text>
  </g>

  <g transform="translate(24,332)">
    <rect width="272" height="84" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <rect x="12" y="12" width="60" height="60" rx="12" fill="url(#box-c)"/>
    <circle cx="42" cy="42" r="16" fill="rgba(255,255,255,0.06)"/>
    <text x="86" y="38" fill="#f5f5f7" font-family="-apple-system, sans-serif" font-size="14" font-weight="600">レトロゲーム</text>
    <text x="86" y="56" fill="#86868b" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">9 アイテム</text>
    <!-- Sale badge -->
    <rect x="86" y="60" width="40" height="14" rx="7" fill="rgba(255,138,95,0.18)" stroke="#ff8a5f" stroke-width="0.6"/>
    <text x="106" y="70" text-anchor="middle" fill="#ff8a5f" font-family="-apple-system, sans-serif" font-size="9" font-weight="600">販売中 2</text>
  </g>

  <g transform="translate(24,428)">
    <rect width="272" height="84" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <rect x="12" y="12" width="60" height="60" rx="12" fill="url(#box-d)"/>
    <rect x="24" y="26" width="32" height="20" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="24" y="50" width="32" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
    <text x="86" y="38" fill="#f5f5f7" font-family="-apple-system, sans-serif" font-size="14" font-weight="600">雑貨</text>
    <text x="86" y="56" fill="#86868b" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">7 アイテム</text>
  </g>

  <g transform="translate(24,524)">
    <rect width="272" height="84" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <rect x="12" y="12" width="60" height="60" rx="12" fill="url(#box-a)" opacity="0.7"/>
    <text x="86" y="38" fill="#f5f5f7" font-family="-apple-system, sans-serif" font-size="14" font-weight="600">ぬいぐるみ</text>
    <text x="86" y="56" fill="#86868b" font-family="-apple-system, sans-serif" font-size="11" font-weight="500">未分類</text>
  </g>

  <!-- Bottom tab -->
  <rect x="10" y="620" width="300" height="50" fill="rgba(20,20,22,0.85)"/>
  <line x1="10" y1="620" x2="310" y2="620" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <g transform="translate(56,640)" fill="#86868b">
    <rect x="-7" y="-7" width="14" height="14" rx="3" stroke="#86868b" stroke-width="1.2" fill="none"/>
  </g>
  <g transform="translate(126,640)">
