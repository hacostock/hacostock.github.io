  </g>
  <g transform="translate(196,640)">
    <circle r="11" fill="rgba(255,255,255,0.08)"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#86868b" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#86868b" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <g transform="translate(266,640)">
    <circle cx="-1" cy="-1" r="5" stroke="#86868b" stroke-width="1.2" fill="none"/>
    <line x1="3" y1="3" x2="6" y2="6" stroke="#86868b" stroke-width="1.4" stroke-linecap="round"/>
  </g>
